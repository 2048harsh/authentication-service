server:
    port: 8080 # Run authorization service on its own port
spring:
    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password: password
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
    sql:
        init:
            mode: always
            data-locations: classpath:data.sql
            continue-on-error: true
            # CRITICAL: run after JPA creates tables
            defer-datasource-initialization: true
    h2:
        console:
            enabled: true
            path: /h2-console
